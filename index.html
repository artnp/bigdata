<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BigData Search</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/128/1162/1162914.png" />
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Sarabun:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --header-bg: rgba(13, 17, 23, 0.75);
            --text: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.15);
            --success: #3fb950;
            --border: #30363d;
            --highlight: rgba(88, 166, 255, 0.2);
            --card-hover: #21262d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', 'Sarabun', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* Glassmorphism Header */
        header {
            position: sticky;
            top: 0;
            width: 100%;
            padding: 16px 40px;
            background: var(--header-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 1000;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, #1f6feb, var(--accent));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            box-shadow: 0 4px 12px rgba(88, 166, 255, 0.3);
        }

        .logo-text {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #58a6ff, #bc8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Reload Button */
        #reload-btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
        }

        #reload-btn:hover {
            background: rgba(88, 166, 255, 0.1);
            border-color: var(--accent);
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        #reload-btn svg {
            transition: transform 0.5s ease;
        }

        #reload-btn:active svg {
            transform: rotate(180deg);
        }

        /* Main layout */
        #main-content {
            max-width: 1220px;
            margin: 0 auto 100px auto;
            padding: 0 20px;
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }

        #main-area {
            flex: 1;
            min-width: 0;
            max-width: 900px;
            text-align: center;
        }

        #sidebar {
            width: 280px;
            flex-shrink: 0;
            position: sticky;
            top: 90px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .sidebar-panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
        }

        .sidebar-panel-title {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sidebar-item {
            padding: 6px 0;
            border-bottom: 1px solid rgba(48,54,61,0.4);
            cursor: pointer;
            transition: all 0.15s;
        }

        .sidebar-item:last-child {
            border-bottom: none;
        }

        .sidebar-item:hover {
            padding-left: 4px;
        }

        .sidebar-item-text {
            font-size: 0.72rem;
            line-height: 1.4;
            color: var(--text);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-weight: 400;
        }

        .sidebar-item-id {
            font-size: 0.6rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .sidebar-empty {
            font-size: 0.7rem;
            color: var(--text-muted);
            padding: 8px 0;
        }

        @media (max-width: 1024px) {
            #sidebar {
                display: none;
            }
            #main-content {
                max-width: 900px;
            }
        }

        .hero-title {
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #ffffff 0%, #c9d1d9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            color: var(--text-muted);
            margin-bottom: 35px;
            font-size: 1.05rem;
            font-weight: 300;
        }

        /* Search Area */
        #pre-main {
            max-width: 1220px;
            margin: 40px auto 0 auto;
            padding: 0 20px;
            text-align: center;
        }
        #search-container {
            max-width: 1220px;
            margin: 0 auto 25px auto;
            padding: 8px 20px;
            position: sticky;
            top: 72px;
            z-index: 10;
            background: var(--bg);
            box-sizing: border-box;
        }

        #search-input {
            width: 100%;
            padding: 18px 25px;
            font-size: 1.15rem;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--card);
            color: white;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow), 0 8px 30px rgba(88, 166, 255, 0.1);
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .tab {
            padding: 8px 20px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-muted);
        }

        .tab:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.06);
        }

        .tab.active {
            background: var(--highlight);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 600;
        }

        /* Search Status Indicator */
        #search-status {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            text-align: left;
            padding-left: 10px;
        }

        /* Results */
        #results {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .result-group-label {
            text-align: left;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin: 15px 0 5px 10px;
        }

        .result-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .result-card:hover {
            border-color: #444c56;
            transform: translateY(-2px);
            background: var(--card-hover);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        .result-card::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .result-card:hover::before {
            opacity: 1;
        }

        /* High Relevance / Top Match Card styling */
        .result-card.high-relevance {
            border: 1px solid rgba(248, 81, 73, 0.45) !important;
            box-shadow: 0 0 8px rgba(248, 81, 73, 0.1) !important;
        }

        .result-card.high-relevance::before {
            background: #f85149 !important;
        }

        .result-card.high-relevance:hover {
            border-color: #f85149 !important;
            box-shadow: 0 6px 20px rgba(248, 81, 73, 0.2) !important;
        }

                .result-card.has-video {
            flex-direction: column;
            align-items: stretch;
            padding: 0;
            gap: 0;
            overflow: hidden;
            cursor: pointer;
        }

        .result-card.has-video .result-card-embed {
            width: 100%;
            background: #000;
        }

        .result-card.has-video .result-card-embed iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
            display: block;
        }

        .result-card.has-video .card-content {
            padding: 10px 14px;
        }

        /* ===== Immersive Newspaper Layout ===== */
        .newspaper-section {
            background: linear-gradient(180deg, rgba(88,166,255,0.04) 0%, transparent 100%);
            border: 1px solid rgba(88,166,255,0.12);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            position: relative;
        }

        .newspaper-section::before {
            content: "FEATURED";
            position: absolute;
            top: -10px;
            left: 24px;
            background: var(--accent);
            color: #fff;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 2px;
            padding: 2px 14px;
            border-radius: 10px;
            text-shadow: none;
        }

        .newspaper-hero {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            align-items: start;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .newspaper-hero:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .newspaper-hero.full {
            grid-template-columns: 1fr;
        }

        .newspaper-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .newspaper-headline {
            font-size: 1.15rem;
            font-weight: 700;
            line-height: 1.4;
            letter-spacing: -0.2px;
            color: #f0f6fc;
            font-family: 'Outfit', 'Sarabun', sans-serif;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .newspaper-excerpt {
            font-size: 0.82rem;
            line-height: 1.6;
            color: var(--text);
            font-weight: 300;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-family: 'Sarabun', 'Outfit', serif;
        }

        .newspaper-excerpt.expanded {
            -webkit-line-clamp: unset;
        }

        .newspaper-meta {
            display: none;
        }

        .newspaper-embed {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            position: relative;
            cursor: pointer;
        }

        .newspaper-card .newspaper-embed {
            border-radius: 0;
        }

        .newspaper-embed iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .newspaper-embed .embed-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: var(--text-muted);
            font-size: 0.9rem;
            gap: 8px;
            transition: background 0.3s;
        }

        .newspaper-embed .embed-placeholder:hover {
            background: linear-gradient(135deg, #1f1f3a, #1a2744);
        }

        .newspaper-embed .embed-placeholder svg {
            width: 40px;
            height: 40px;
            opacity: 0.6;
        }

        .newspaper-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .newspaper-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            display: flex;
            flex-direction: column;
            cursor: pointer;
            position: relative;
        }

        .newspaper-card:hover {
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
        }

        .newspaper-card .newspaper-embed {
            border-radius: 0;
            aspect-ratio: 16 / 9;
        }

        .newspaper-card-body {
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }

        .newspaper-card-title {
            font-size: 0.88rem;
            font-weight: 600;
            color: #f0f6fc;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .newspaper-card-text {
            font-size: 0.75rem;
            color: var(--text);
            line-height: 1.5;
            font-weight: 300;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .newspaper-card-footer {
            display: none;
        }

        .edit-link {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 1rem;
            opacity: 0.5;
            background: rgba(0,0,0,0.5);
            border-radius: 4px;
            padding: 2px 6px;
            z-index: 2;
            line-height: 1;
            color: var(--accent);
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .edit-link:hover {
            opacity: 1;
            color: #58a6ff;
        }
        .newspaper-badge {
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.65rem;
            font-weight: 600;
            background: rgba(88,166,255,0.1);
            border: 1px solid rgba(88,166,255,0.2);
            color: var(--accent);
        }

        .newspaper-badge.hot {
            background: rgba(248,81,73,0.12);
            border-color: rgba(248,81,73,0.25);
            color: #f85149;
        }

        @media (max-width: 768px) {
            .newspaper-hero {
                grid-template-columns: 1fr;
            }
            .newspaper-grid {
                grid-template-columns: 1fr;
            }
            .newspaper-headline {
                font-size: 1.25rem;
            }
            .newspaper-section {
                padding: 16px;
            }
        }

        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .card-content {
            flex: 1;
            min-width: 0;
        }

        .card-text {
            font-size: 1rem;
            font-weight: 400;
            color: #f0f6fc;
            margin-bottom: 6px;
            word-break: break-word;
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .card-badge {
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.05);
            font-weight: 600;
        }

        .yt-icon {
            color: #ff0000;
        }

        .line-icon {
            background: #06C755;
            color: #fff;
            font-size: 0.58rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1;
        }

        .linevoom-badge {
            background: #06C755;
            color: white;
            font-size: 0.65rem;
            padding: 1px 5px;
            border-radius: 3px;
            font-weight: bold;
        }

        #linevoom-embed-container {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            background: #000;
            overflow: hidden;
        }

        #linevoom-embed-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 8px;
            display: block;
        }

        #yt-player-container {
            width: 100%;
            height: 100%;
        }

        #yt-player-container iframe {
            width: 100%;
            height: 100%;
        }

        .popup-frame.linevoom.bottom-right {
            width: 440px;
        }

        .popup-frame.linevoom.centered {
            max-width: 1200px;
        }

        .shorts-badge {
            background: #ff0000;
            color: white;
            font-size: 0.65rem;
            padding: 1px 5px;
            border-radius: 3px;
            font-weight: bold;
        }

        .highlight {
            background: rgba(255, 215, 0, 0.18);
            color: #ffd700;
            padding: 1px 4px;
            margin: 0 1px;
            border-radius: 3px;
            font-weight: 600;
            border: 1px solid rgba(255, 215, 0, 0.35);
            text-shadow: 0 0 4px rgba(255, 215, 0, 0.4);
        }

        .highlight-semantic {
            background: rgba(188, 140, 255, 0.18);
            color: #bc8cff;
            padding: 1px 4px;
            margin: 0 1px;
            border-radius: 3px;
            font-weight: 600;
            border: 1px solid rgba(188, 140, 255, 0.35);
            text-shadow: 0 0 4px rgba(188, 140, 255, 0.4);
            cursor: help;
        }

        .smart-expansion-info {
            display: none !important;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 15px;
            align-items: center;
            padding-left: 10px;
        }

        .smart-badge {
            font-size: 0.72rem;
            padding: 3px 10px;
            border-radius: 12px;
            background: rgba(188, 140, 255, 0.1);
            border: 1px solid rgba(188, 140, 255, 0.25);
            color: #bc8cff;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .smart-badge:hover {
            background: rgba(188, 140, 255, 0.2);
            border-color: rgba(188, 140, 255, 0.5);
        }

        .smart-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        /* Skeletons */
        .skeleton {
            background: linear-gradient(90deg, #161b22 25%, #21262d 50%, #161b22 75%);
            background-size: 200%;
            animation: skeleton-loading 1.5s infinite;
            height: 76px;
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
        }

        @keyframes skeleton-loading {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            height: 8px;
            overflow: hidden;
            margin-top: 12px;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #1f6feb, var(--accent), #bc8cff);
            background-size: 200% 100%;
            border-radius: 8px;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: progress-glow 2s linear infinite;
            box-shadow: 0 0 10px rgba(88, 166, 255, 0.5);
        }

        @keyframes progress-glow {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Video Popover/Frame */
        .popup-frame {
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: fixed;
            z-index: 998;
            background: #000;
            border-radius: 12px;
            padding: 4px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
            border: 1px solid var(--border);
            opacity: 0;
            pointer-events: none;
            box-sizing: border-box;
        }

        .popup-frame.centered {
            top: 5vh;
            left: 5vw;
            transform: scale(0.9);
            width: 90vw;
            max-width: 1200px;
            height: 90vh;
            max-height: 800px;
        }

        .popup-frame.centered.active {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        .popup-frame.centered.shorts {
            width: auto;
            max-width: 400px;
            height: auto;
            max-height: 90vh;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
        }

        .popup-frame.centered.shorts.active {
            transform: translate(-50%, -50%) scale(1);
        }

        .popup-frame.bottom-right {
            bottom: 30px;
            right: 30px;
            top: auto;
            left: auto;
            transform: scale(0.9);
            transform-origin: bottom right;
            width: 440px;
        }

        .popup-frame.bottom-right.active {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        .popup-frame.bottom-right.shorts {
            width: 260px;
        }

        .popup-frame iframe {
            border: none;
            border-radius: 8px;
            display: block;
            width: 100%;
            height: 100%;
        }

        #close-video-frame {
            position: absolute;
            top: 10px;
            right: 10px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1001;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            line-height: 30px;
            text-align: center;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #close-video-frame:hover {
            background: #da3633;
            transform: rotate(90deg);
        }

        /* Update Bar (background sync) */
        #update-bar {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 999;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
            opacity: 0;
            pointer-events: none;
            font-size: 0.85rem;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            flex-wrap: wrap;
        }

        #update-bar.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }

        #update-bar-text {
            color: var(--text);
            font-weight: 500;
            white-space: nowrap;
        }

        #update-bar-count {
            color: var(--text-muted);
            font-size: 0.78rem;
        }

        #update-bar-progress {
            width: 80px;
            height: 4px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 4px;
            overflow: hidden;
            flex-shrink: 0;
        }

        #update-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #1f6feb, var(--accent));
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        #update-bar.done #update-bar-fill {
            background: var(--success);
        }

        /* Copy Toast */
        #copy-popup {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--success);
            color: white;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999;
            box-shadow: 0 10px 25px rgba(63, 185, 80, 0.3);
            pointer-events: none;
        }

        #copy-popup.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Embed Mode Styles */
        body.embed-mode {
            background: var(--bg);
        }

        body.embed-mode header {
            display: none !important;
        }

        body.embed-mode #main-content {
            margin: 0 auto;
            padding: 10px 0;
            max-width: 100%;
        }

        body.embed-mode .result-card {
            padding: 6px 12px !important;
            gap: 8px !important;
            border-radius: 6px !important;
        }

        body.embed-mode .result-card.has-video {
            padding: 0 !important;
            gap: 0 !important;
        }
        body.embed-mode .result-card.has-video .card-content {
            padding: 6px 10px !important;
        }

        body.embed-mode .card-icon {
            width: 30px !important;
            height: 30px !important;
            font-size: 1rem !important;
            border-radius: 6px !important;
        }

        body.embed-mode .card-text {
            font-size: 0.8rem !important;
            line-height: 1.4 !important;
        }

        body.embed-mode .card-meta {
            font-size: 0.7rem !important;
        }

        body.embed-mode .hero-title,
        body.embed-mode .hero-subtitle,
        body.embed-mode #search-container,
        body.embed-mode #api-link-container,
        body.embed-mode #share-embed-container,
        body.embed-mode .filter-tabs,
        body.embed-mode #search-status {
            display: none !important;
        }


        /* Media Queries */


        @media (max-width: 768px) {
            header {
                padding: 15px 20px;
            }

            .hero-title {
                font-size: 2.1rem;
            }

            #main-content {
                margin-top: 30px;
            }

            #pre-main {
                margin-top: 20px;
            }

            /* Center the bottom-right popup on mobile so it doesn't overflow screen */
            .popup-frame.bottom-right {
                top: 50% !important;
                left: 50% !important;
                right: auto !important;
                bottom: auto !important;
                transform: translate(-50%, -50%) scale(0.9) !important;
                width: 95% !important;
                max-width: 440px !important;
                transform-origin: center !important;
            }

            .popup-frame.bottom-right.active {
                transform: translate(-50%, -50%) scale(1) !important;
            }

            .popup-frame.bottom-right.shorts {
                width: 90% !important;
                max-width: 280px !important;
            }
        }

        /* Inline LINE Voom Card layout */
        .result-card.linevoom-card {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            width: 100%;
            max-width: 488px; /* 464px widget + 24px padding */
            margin: 0 auto;
            background: var(--card); /* Show card background for clickable frame */
            border-radius: 12px;
            overflow: hidden;
            transition: max-width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: zoom-in;
        }

        .result-card.linevoom-card.expanded {
            max-width: 100%;
            cursor: zoom-out;
        }

        .result-card.linevoom-card .linevoom-embed-inline {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
        }

        .result-card.linevoom-card .linevoom-embed-inline iframe,
        .result-card.linevoom-card .linevoom-embed-inline blockquote {
            width: 100% !important;
            max-width: 100% !important;
        }

        @media (max-width: 480px) {
            .result-card {
                padding: 6px 12px;
                gap: 10px;
            }

            .card-icon {
                width: 28px;
                height: 28px;
                font-size: 0.9rem;
            }

            .card-text {
                font-size: 0.85rem;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo-area">
            <div class="logo-icon">B</div>
            <div class="logo-text">BigData Search</div>
        </div>
        <button id="reload-btn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 4v6h-6"></path>
                <path d="M1 20v-6h6"></path>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
            </svg>
            Reload Data
        </button>
    </header>

    <div id="pre-main">
        <div class="hero-title">Intelligent Data Search</div>
        <div class="hero-subtitle">Fast client-side keyword search across your entire GitHub database</div>
    </div>

    <div id="search-container">
        <input type="text" id="search-input" placeholder="พิมพ์เพื่อค้นหาข้อมูล.." autocomplete="off">
    </div>

    <main id="main-content">
        <div id="main-area">
            <div class="filter-tabs">
                <button class="tab active" data-filter="all">All Items</button>
                <button class="tab" data-filter="video">Videos</button>
                <button class="tab" data-filter="text">Research & Info</button>
            </div>

            <div id="search-status">กำลังดาวน์โหลดข้อมูลเริ่มต้นจาก GitHub...</div>

            <div id="smart-expansion-info" class="smart-expansion-info" style="display:none;"></div>

            <div id="results"></div>
        </div>

        <aside id="sidebar">
            <div class="sidebar-panel" id="panel-bigdata">
                <div class="sidebar-panel-title">📊 BigData ล่าสุด</div>
                <div id="sidebar-bigdata-list"></div>
            </div>
            <div class="sidebar-panel" id="panel-reel">
                <div class="sidebar-panel-title">🎬 Reel ล่าสุด</div>
                <div id="sidebar-reel-list"></div>
            </div>
        </aside>
    </main>

    <div id="copy-popup">คัดลอกลงคลิปบอร์ดแล้ว! ✅</div>
    <div class="popup-frame" id="video-frame"></div>
    <div id="update-bar">
        <span id="update-bar-text">กำลังตรวจสอบข้อมูลใหม่...</span>
        <span id="update-bar-count"></span>
        <div id="update-bar-progress">
            <div id="update-bar-fill"></div>
        </div>
    </div>

    <script>
        // Load YouTube IFrame Player API
        (function () {
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            const firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
        })();

        // GitHub configuration
        const GITHUB_USER = 'artnp';
        const GITHUB_REPO = 'bigdata';
        const GITHUB_BRANCH = 'main';
        const TOTAL_FILES = 14; // Update this count if files are added/removed (8 bigdata + 6 reel)

        const searchInput = document.getElementById('search-input');
        const resultsDiv = document.getElementById('results');
        const searchStatus = document.getElementById('search-status');
        const copyPopup = document.getElementById('copy-popup');
        const videoFrame = document.getElementById('video-frame');
        const reloadBtn = document.getElementById('reload-btn');



        let items = [];
        let currentFilter = 'all';
        let searchTimer = null;
        let isFetching = false;
        let wasLoadedWithQuery = false;
        let initialUrlQuery = null;
        let _isLazyLoading = false;
        let _lazySearchQuery = '';
        let _lazyLoadedCount = 0;

        const CACHE_KEY = 'bigdata_search_cache';
        const CACHE_VERSION = 2; // Increment to invalidate old caches
        const DAILY_CHECK_INTERVAL_MS = 60 * 60 * 1000; // Check every hour if day changed

        function getTodayDate() {
            return new Date().toISOString().slice(0, 10); // YYYY-MM-DD
        }

        function saveToCache(itemsList) {
            try {
                const cacheData = {
                    version: CACHE_VERSION,
                    timestamp: Date.now(),
                    date: getTodayDate(),
                    items: itemsList
                };
                localStorage.setItem(CACHE_KEY, JSON.stringify(cacheData));
            } catch (e) {
                console.warn('Failed to save to localStorage cache:', e);
            }
        }

        function loadFromCache() {
            try {
                const cached = localStorage.getItem(CACHE_KEY);
                if (cached) {
                    const data = JSON.parse(cached);
                    if (data.version !== CACHE_VERSION) {
                        localStorage.removeItem(CACHE_KEY);
                        return null;
                    }
                    return data;
                }
            } catch (e) {
                console.warn('Failed to load from localStorage cache:', e);
            }
            return null;
        }

        // Update bar helpers
        const updateBar = document.getElementById('update-bar');
        const updateBarText = document.getElementById('update-bar-text');
        const updateBarCount = document.getElementById('update-bar-count');
        const updateBarFill = document.getElementById('update-bar-fill');

        function showUpdateBar(text, count) {
            updateBar.classList.remove('done');
            updateBar.classList.add('show');
            updateBarText.textContent = text;
            if (count) {
                updateBarCount.textContent = count;
                updateBarCount.style.display = '';
            } else {
                updateBarCount.style.display = 'none';
            }
        }

        function updateUpdateBarProgress(loaded, total) {
            const pct = Math.min(100, Math.round((loaded / total) * 100));
            if (updateBarFill) updateBarFill.style.width = pct + '%';
            if (updateBarCount && updateBarCount.style.display !== 'none') {
                updateBarCount.textContent = `${loaded}/${total}`;
            }
        }

        function hideUpdateBar(done = true) {
            if (done) {
                updateBar.classList.add('done');
                updateBarText.textContent = 'อัปเดตข้อมูลเสร็จสิ้น';
                updateBarCount.style.display = 'none';
                if (updateBarFill) updateBarFill.style.width = '100%';
                setTimeout(() => {
                    updateBar.classList.remove('show', 'done');
                }, 2500);
            } else {
                updateBar.classList.remove('show', 'done');
            }
        }

        let closeVideoTimeout = null;
        let lineVoomResizeHandler = null;
        let currentPlayer = null;

        function pauseAllYouTubeEmbeds() {
            document.querySelectorAll('iframe[src*="youtube.com/embed"]').forEach(iframe => {
                try { iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*'); } catch(e) {}
            });
            document.querySelectorAll('.newspaper-embed iframe, .result-card-embed iframe, #yt-player-container iframe').forEach(iframe => {
                try { iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*'); } catch(e) {}
            });
            if (currentPlayer) {
                try { currentPlayer.pauseVideo(); } catch(e) {}
            }
        }

        function closeVideo() {
            if (currentPlayer) {
                try { currentPlayer.pauseVideo(); currentPlayer.destroy(); } catch(e) {}
                currentPlayer = null;
            }
            if (lineVoomResizeHandler) {
                window.removeEventListener('message', lineVoomResizeHandler);
                lineVoomResizeHandler = null;
            }
            videoFrame.classList.remove('active');
            if (closeVideoTimeout) clearTimeout(closeVideoTimeout);
            closeVideoTimeout = setTimeout(() => {
                videoFrame.innerHTML = '';
                videoFrame.className = 'popup-frame';
                closeVideoTimeout = null;
            }, 350);
        }

        function showSkeleton(count) {
            let html = '';
            for (let i = 0; i < count; i++) {
                html += '<div class="skeleton"></div>';
            }
            resultsDiv.innerHTML = html;
        }

        // Fetch all files from GitHub sequentially
        // force = true means show UI progress, force load
        // force = false means silent background update
        async function fetchDatabase(force = true) {
            if (isFetching || _isLazyLoading) return;
            isFetching = true;

            if (force) {
                searchInput.disabled = true;
                searchInput.placeholder = "พิมพ์เพื่อค้นหาข้อมูล..";
                searchStatus.innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <span>กำลังดาวน์โหลดฐานข้อมูล...</span>
                <span style="color:#58a6ff;font-weight:600" id="progress-percent">0%</span>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar-fill"></div>
            </div>
        `;
                showSkeleton(5);
            } else {
                showUpdateBar('กำลังตรวจสอบอัปเดต...');
            }

            const bigdataItems = [];
            const reelItems = [];
            let loadedCount = 0;

            const updateProgress = () => {
                if (force) {
                    const percent = Math.min(99, Math.round((loadedCount / TOTAL_FILES) * 100));
                    const percentEl = document.getElementById('progress-percent');
                    const barFillEl = document.getElementById('progress-bar-fill');
                    if (percentEl) percentEl.textContent = `${percent}%`;
                    if (barFillEl) barFillEl.style.width = `${percent}%`;
                } else {
                    updateUpdateBarProgress(loadedCount, TOTAL_FILES);
                }
            };

            // 1. Fetch JSON files sequentially
            let n = 1;
            const isLocal = window.location.protocol === 'file:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            while (true) {
                try {
                    const url = isLocal
                        ? `./bigdata${n}.json?t=${Date.now()}`
                        : `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}/bigdata${n}.json?t=${Date.now()}`;
                    const response = await fetch(url);
                    if (!response.ok) {
                        // If bigdata1.json returns 404, we check bigdata.json as a fallback
                        if (n === 1) {
                            const fallbackUrl = isLocal
                                ? `./bigdata.json?t=${Date.now()}`
                                : `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}/bigdata.json?t=${Date.now()}`;
                            const fallbackResp = await fetch(fallbackUrl);
                            if (fallbackResp.ok) {
                                const rawText = await fallbackResp.text();
                                const fallbackData = JSON.parse(rawText);
                                if (Array.isArray(fallbackData)) {
                                    let pos = 0;
                                    fallbackData.forEach(item => {
                                        const hasLineVoom = item.url && item.url.includes('linevoom');
                                        const dataKey = rawText.indexOf('"data"', pos);
                                        const lineNum = dataKey !== -1 ? rawText.substring(0, dataKey).split('\n').length : 1;
                                        if (dataKey !== -1) pos = dataKey + 6;
                                        bigdataItems.push({
                                            type: hasLineVoom ? 'video' : 'text',
                                            text: item.data,
                                            id: hasLineVoom ? item.url : undefined,
                                            src: 'bigdata',
                                            fileNum: 0,
                                            lineNum: lineNum
                                        });
                                    });
                                }
                            }
                        }
                        break; // Stop looking for next indices
                    }
                    const rawText = await response.text();
                    const data = JSON.parse(rawText);
                    if (Array.isArray(data)) {
                        let pos = 0;
                        data.forEach(item => {
                            const hasLineVoom = item.url && item.url.includes('linevoom');
                            const dataKey = rawText.indexOf('"data"', pos);
                            const lineNum = dataKey !== -1 ? rawText.substring(0, dataKey).split('\n').length : 1;
                            if (dataKey !== -1) pos = dataKey + 6;
                            bigdataItems.push({
                                type: hasLineVoom ? 'video' : 'text',
                                text: item.data,
                                id: hasLineVoom ? item.url : undefined,
                                src: 'bigdata',
                                fileNum: n,
                                lineNum: lineNum
                            });
                        });
                    }
                    loadedCount++;
                    updateProgress();
                    n++;
                } catch (e) {
                    console.error(`Error loading bigdata${n}.json:`, e);
                    break;
                }
            }

            // 2. Fetch Reel JS files sequentially
            n = 1;
            while (true) {
                try {
                    const url = isLocal
                        ? `./reel${n}.js?t=${Date.now()}`
                        : `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}/reel${n}.js?t=${Date.now()}`;
                    const response = await fetch(url);
                    if (!response.ok) {
                        // If reel1.js returns 404, check reel.js fallback
                        if (n === 1) {
                            const fallbackUrl = isLocal
                                ? `./reel.js?t=${Date.now()}`
                                : `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}/reel.js?t=${Date.now()}`;
                            const fallbackResp = await fetch(fallbackUrl);
                            if (fallbackResp.ok) {
                                const fallbackText = await fallbackResp.text();
                                parseReelJsText(fallbackText, reelItems, 0);
                            }
                        }
                        break;
                    }
                    const text = await response.text();
                    parseReelJsText(text, reelItems, n);
                    loadedCount++;
                    updateProgress();
                    n++;
                } catch (e) {
                    console.error(`Error loading reel${n}.js:`, e);
                    break;
                }
            }

            // Save source-separated for sidebar
            window._lastBigdataItems = bigdataItems.slice(-5);
            window._lastReelItems = reelItems.slice(-5);

            // Deduplicate combined items
            const combined = [...bigdataItems, ...reelItems];
            const uniqueItems = [];
            const seen = new Set();
            for (const item of combined) {
                const key = `${item.type}:${item.id || ''}:${item.text.trim()}`;
                if (!seen.has(key)) {
                    seen.add(key);
                    uniqueItems.push(item);
                }
            }

            if (force) {
                const percentEl = document.getElementById('progress-percent');
                const barFillEl = document.getElementById('progress-bar-fill');
                if (percentEl) percentEl.textContent = '100%';
                if (barFillEl) barFillEl.style.width = '100%';
                await new Promise(resolve => setTimeout(resolve, 350));
            } else {
                updateUpdateBarProgress(TOTAL_FILES, TOTAL_FILES);
            }

            // Compare with current items list to check if there are changes
            let changed = false;
            if (items.length !== uniqueItems.length) {
                changed = true;
            } else {
                const oldSignature = items.map(i => i.id || i.text.slice(0, 10)).slice(0, 100).join('|');
                const newSignature = uniqueItems.map(i => i.id || i.text.slice(0, 10)).slice(0, 100).join('|');
                if (oldSignature !== newSignature) {
                    changed = true;
                }
            }

            if (changed || force || items.length === 0) {
                items = uniqueItems;
                window._lastBigdataItems = bigdataItems.slice(-5);
                window._lastReelItems = reelItems.slice(-5);
                saveToCache(items);
                buildSmartIndex(items, true);
                populateSidebar();

                const uniqueVideoCount = items.filter(i => i.type === 'video').length;
                const uniqueTextCount = items.filter(i => i.type === 'text').length;

                const updatedLabel = force ? '' : ' (อัปเดตข้อมูลใหม่แล้ว)';
                searchStatus.innerHTML = `โหลดเสร็จสิ้น${updatedLabel} | มีวิดีโอ <span style="color:#fff;font-weight:600">${uniqueVideoCount.toLocaleString()}</span> รายการ, ข้อความ <span style="color:#fff;font-weight:600">${uniqueTextCount.toLocaleString()}</span> รายการ`;

                // Re-run search if user is currently searching
                if (searchInput.value.trim().length > 0) {
                    performSearch(searchInput.value);
                }

                if (!force) {
                    hideUpdateBar(true);
                }
            } else {
                saveToCache(items);
                populateSidebar();
                if (!force) {
                    hideUpdateBar(false);
                }
            }

            isFetching = false;
            searchInput.placeholder = "พิมพ์เพื่อค้นหาข้อมูล..";
            searchInput.disabled = false;

            if (force) {
                searchInput.focus();
                if (!searchInput.value) {
                    resultsDiv.innerHTML = '';
                }
            }
        }

        function isCacheFromToday() {
            const cached = loadFromCache();
            if (cached && cached.date) {
                return cached.date === getTodayDate();
            }
            return false;
        }

        async function syncCacheInBackground(force = false) {
            if (!force && isCacheFromToday()) {
                console.log('Background sync skipped: already have today\'s data.');
                return;
            }
            console.log('Starting silent background update check...');
            await fetchDatabase(false);
        }

        function startDailyChecker() {
            setInterval(() => {
                if (!isCacheFromToday()) {
                    console.log('New day detected by daily checker, triggering background update...');
                    fetchDatabase(false);
                }
            }, DAILY_CHECK_INTERVAL_MS);
        }

        function initDatabase() {
            const cached = loadFromCache();

            // Check for URL query parameter on load
            const urlParams = new URLSearchParams(window.location.search);
            const queryParam = urlParams.get('q');
            const embedParam = urlParams.get('embed');
            const isEmbedMode = (embedParam === 'true' || embedParam === '1');

            if (isEmbedMode) {
                document.body.classList.add('embed-mode');
            }

            if (cached && Array.isArray(cached.items) && cached.items.length > 0) {
                // Loaded from cache!
                items = cached.items;
                buildSmartIndex(items, false);
                window._lastBigdataItems = items.filter(i => i.src === 'bigdata').slice(-5);
                window._lastReelItems = items.filter(i => i.src === 'reel').slice(-5);
                // If no src field (old cache), just show latest items in both panels
                if (window._lastBigdataItems.length === 0) {
                    window._lastBigdataItems = items.filter(i => i.type === 'text').slice(-5);
                }
                if (window._lastReelItems.length === 0) {
                    window._lastReelItems = items.filter(i => i.type === 'video').slice(-5);
                }
                populateSidebar();

        function mountLineVoomEmbed(postId) {
            const container = document.getElementById('linevoom-embed-container');
            if (!container) return;

            if (lineVoomResizeHandler) {
                window.removeEventListener('message', lineVoomResizeHandler);
                lineVoomResizeHandler = null;
            }

            const iframeUuid = 'embed_' + (typeof crypto !== 'undefined' && crypto.randomUUID
                ? crypto.randomUUID()
                : String(Date.now()));
            const params = new URLSearchParams({
                playable: 'true',
                onlyVideo: 'true',
                autoPlay: 'true',
                referer: encodeURIComponent(window.location.origin),
                fullUrlReferer: encodeURIComponent(window.location.href),
                iframeUuid
            });
            const src = `https://linevoom.line.me/embedded/post/${postId}?${params.toString()}`;

            const iframe = document.createElement('iframe');
            iframe.src = src;
            iframe.id = iframeUuid;
            iframe.setAttribute('frameborder', '0');
            iframe.setAttribute('scrolling', 'no');
            iframe.setAttribute('allowfullscreen', 'true');
            iframe.setAttribute('allow', 'autoplay; encrypted-media');
            container.innerHTML = '';
            container.appendChild(iframe);

            lineVoomResizeHandler = (event) => {
                if (!event.data || event.data.action !== 'resize' || !event.data.params) return;
                if (event.source !== iframe.contentWindow) return;

                const { height, width } = event.data.params;
                if (!height || !width) return;

                const containerWidth = container.clientWidth || container.offsetWidth;
                if (!containerWidth) return;

                const scaledHeight = Math.round((containerWidth / width) * height);
                container.style.aspectRatio = 'auto';
                container.style.height = scaledHeight + 'px';
                iframe.style.height = scaledHeight + 'px';
            };
            window.addEventListener('message', lineVoomResizeHandler);
        }

        // Segment query into words using native Intl.Segmenter (optimized for performance)
        function segmentText(text) {

        function getMergedTerms(words) {

                terms.push(words[i] + words[i + 1]);
                if (i < words.length - 2) {
                    terms.push(words[i] + words[i + 1] + words[i + 2]);

            return [...new Set(terms)];

        function getConsonantSkeleton(word) {
            const SOUND_MAP = {
                'ก': 'k', 'ข': 'k', 'ฃ': 'k', 'ค': 'k', 'ฅ': 'k', 'ฆ': 'k',
                'ง': 'g',
                'จ': 'c', 'ฉ': 'c', 'ช': 'c', 'ฌ': 'c',
                'ซ': 's', 'ศ': 's', 'ษ': 's', 'ส': 's',
                'ญ': 'y',
                'ฎ': 't', 'ฏ': 't', 'ฐ': 't', 'ฑ': 't', 'ฒ': 't',
                'ณ': 'n', 'น': 'n',
                'ด': 't', 'ต': 't', 'ถ': 't', 'ท': 't', 'ธ': 't',
                'บ': 'b', 'ป': 'p', 'ผ': 'p', 'พ': 'p', 'ภ': 'p', 'ฝ': 'f', 'ฟ': 'f',
                'ม': 'm', 'ย': 'y', 'ร': 'r', 'ล': 'l', 'ว': 'w',
                'ห': 'h', 'ฬ': 'l', 'อ': 'q', 'ฮ': 'h'
            };

            // Silence Thai characters followed by garan (์) to align spellings (e.g. บิทคอยน์ -> บิทคอย)
            const cleanedWord = word.replace(/.[์]/g, '').toLowerCase();

            let skeleton = '';
            for (const ch of cleanedWord) {
                if (SOUND_MAP[ch]) {
                    skeleton += SOUND_MAP[ch];
                } else if (/[a-zA-Z]/.test(ch)) {
                    skeleton += ch.toLowerCase();
                }
            }
            return skeleton;
        }

        // Build Smart Index asynchronously in chunks to prevent UI locking/blocking
        async function buildSmartIndex(itemsList, forceRebuild = false) {
            console.time('buildSmartIndex');

            if (!forceRebuild) {
                const cached = loadSmartIndexFromCache();
                if (cached) {
                    smartIndex = cached;
                    console.log('Smart Index loaded from cache successfully.');
                    console.timeEnd('buildSmartIndex');
                    return;
                }
            }

            const thaiEngPairs = new Map();
            const engThaiPairs = new Map();
            const consonantMap = new Map();
            const cooccurrence = new Map();

            const addPair = (thai, eng) => {
                const tl = thai.toLowerCase().trim();
                const el = eng.toLowerCase().trim();
                if (tl.length < 2 || el.length < 2) return;
                if (!thaiEngPairs.has(tl)) thaiEngPairs.set(tl, new Set());
                thaiEngPairs.get(tl).add(el);
                if (!engThaiPairs.has(el)) engThaiPairs.set(el, new Set());
                engThaiPairs.get(el).add(tl);
            };

            // Safe optimized regexes to extract Thai-English pairs (linear time, no backtracking)
            const r1 = /([\u0E01-\u0E4F\s]+)\s*[\(（]([A-Za-z0-9\s\-'\.]+)[\)）]/g;
            const r2 = /([A-Za-z0-9\s\-'\.]+)\s*[\(（]([\u0E01-\u0E4F\s]+)[\)）]/g;
            const r3 = /([\u0E01-\u0E4F]{2,})\s+([A-Z][a-zA-Z0-9]{2,})/g;
            const r4 = /([A-Z][a-zA-Z0-9]{2,})\s+([\u0E01-\u0E4F]{2,})/g;

            const chunkSize = 1500;
            for (let i = 0; i < itemsList.length; i += chunkSize) {
                const chunk = itemsList.slice(i, i + chunkSize);

                for (const item of chunk) {
                    const text = item.text;

                    // Pattern Match (Bypassed if text does not contain brackets or uppercase letters)
                    if (text.includes('(') || text.includes('（')) {
                        for (const m of text.matchAll(r1)) addPair(m[1], m[2]);
                        for (const m of text.matchAll(r2)) addPair(m[2], m[1]);
                    }
                    if (/[A-Z]/.test(text)) {
                        for (const m of text.matchAll(r3)) addPair(m[1], m[2]);
                        for (const m of text.matchAll(r4)) addPair(m[2], m[1]);
                    }

                    const words = segmentText(text);
                    const sigWords = words.filter(w => !THAI_STOP_WORDS.has(w) && w.length >= 2);

                    // Index only the segmented words (NO MERGES in database items to prevent massive index)
                    sigWords.forEach(w => {
                        if (/[\u0E01-\u0E2E]/.test(w) && w.length >= 4) {
                            const sk = getConsonantSkeleton(w);
                            if (sk.length >= 3) {
                                if (!consonantMap.has(sk)) consonantMap.set(sk, new Set());
                                consonantMap.get(sk).add(w);
                            }
                        }
                    });

                    // Co-occurrence
                    const coWords = sigWords.slice(0, 10);
                    for (let j = 0; j < coWords.length; j++) {
                        for (let k = j + 1; k < coWords.length; k++) {
                            const w1 = coWords[j], w2 = coWords[k];
                            if (w1 === w2) continue;
                            if (!cooccurrence.has(w1)) cooccurrence.set(w1, new Map());
                            cooccurrence.get(w1).set(w2, (cooccurrence.get(w1).get(w2) || 0) + 1);
                            if (!cooccurrence.has(w2)) cooccurrence.set(w2, new Map());
                            cooccurrence.get(w2).set(w1, (cooccurrence.get(w2).get(w1) || 0) + 1);
                        }
                    }
                }

                // Yield to the browser main thread to keep UI completely responsive
                await new Promise(resolve => setTimeout(resolve, 0));
            }

            const filteredCo = new Map();
            for (const [word, relMap] of cooccurrence) {
                const top = [...relMap.entries()]
                    .filter(([_, c]) => c >= 3)
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, 5)
                    .map(([w]) => w);
                if (top.length > 0) filteredCo.set(word, top);
            }

            smartIndex = { thaiEngPairs, engThaiPairs, consonantMap, cooccurrence: filteredCo };
            saveSmartIndexToCache(smartIndex);

            console.timeEnd('buildSmartIndex');
            console.log(`Smart Index built: ${thaiEngPairs.size} pairs, ${consonantMap.size} skeletons, ${filteredCo.size} co-occurrence`);

            // Re-run search if query is currently active
            if (searchInput.value.trim().length > 0) {
                performSearch(searchInput.value);
            }
        }

        function expandQuerySmart(queryWords, rawQuery) {
            if (!smartIndex) return { original: queryWords, expanded: [], map: {} };

            const expanded = new Set();
            const map = {};
            const rawLower = rawQuery ? rawQuery.toLowerCase().trim() : '';

            // Generate merged terms from queryWords (only for user query lookup)
            const queryTerms = getMergedTerms(queryWords);

            // 1. Direct Transliteration Lookup (using merged terms)
            for (const term of queryTerms) {
                if (TRANSLITERATION_BOOST.has(term)) {
                    for (const trans of TRANSLITERATION_BOOST.get(term)) {
                        if (!queryWords.includes(trans) && !expanded.has(trans)) {
                            expanded.add(trans);
                            map[trans] = { source: 'thai-eng', from: term, label: `${term} → ${trans}` };
                        }
                    }
                }
            }

            // 2. Core Synonym Group Lookup (using merged terms)
            for (const term of queryTerms) {
                for (const group of CORE_SYNONYMS) {
                    if (group.some(s => s === term)) {
                        for (const syn of group) {
                            if (syn !== term && !queryWords.includes(syn) && !expanded.has(syn)) {
                                expanded.add(syn);
                                map[syn] = { source: 'synonym', from: term, label: `${term} ≈ ${syn}` };
                            }
                        }
                        break;
                    }
                }
            }

            // 3. Consonant Skeleton Group Lookup & Transitive Transliterations (using merged terms)
            for (const term of queryTerms) {
                if (/[\u0E01-\u0E2E]/.test(term) && term.length >= 3) {
                    const sk = getConsonantSkeleton(term);
                    if (sk.length >= 2 && smartIndex.consonantMap.has(sk)) {
                        for (const similar of smartIndex.consonantMap.get(sk)) {
                            if (similar !== term && !queryWords.includes(similar) && !expanded.has(similar) && Math.abs(similar.length - term.length) <= 3) {
                                expanded.add(similar);
                                map[similar] = { source: 'consonant', from: term, label: `${term} ≈ ${similar}` };

                                // TRANSITIVE TRANSLITERATION (e.g. บิทคอย -> similarity match บิทคอยน์ -> transliteration bitcoin)
                                if (TRANSLITERATION_BOOST.has(similar)) {
                                    for (const trans of TRANSLITERATION_BOOST.get(similar)) {
                                        if (!queryWords.includes(trans) && !expanded.has(trans)) {
                                            expanded.add(trans);
                                            map[trans] = { source: 'thai-eng', from: term, label: `${term} → ${trans}` };
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
            }

            // 4. Co-occurrence Group Lookup (using individual words to prevent noise)
            for (const word of queryWords) {
                if (THAI_STOP_WORDS.has(word) || word.length < 2) continue;
                const wl = word.toLowerCase();
                if (smartIndex.cooccurrence.has(wl)) {
                    const related = smartIndex.cooccurrence.get(wl);
                    for (const rw of related.slice(0, 3)) {
                        if (!queryWords.includes(rw) && !expanded.has(rw)) {
                            expanded.add(rw);
                            map[rw] = { source: 'cooccurrence', from: word, label: `${word} ↔ ${rw}` };
                        }
                    }
                }
            }

            // 5. Check rawQuery against TRANSLITERATION_BOOST directly as fallback
            if (rawLower.length >= 2 && TRANSLITERATION_BOOST.has(rawLower)) {
                for (const trans of TRANSLITERATION_BOOST.get(rawLower)) {
                    if (!expanded.has(trans)) {
                        expanded.add(trans);
                        map[trans] = { source: 'thai-eng', from: rawLower, label: `${rawQuery.trim()} → ${trans}` };
                    }
                }
            }

            return { original: queryWords, expanded: [...expanded], map };
        }

        // Thai phonetic normalization for typo tolerance
        const THAI_PHONETIC_MAP = {
            'ก':'ก','ข':'ก','ฃ':'ก','ค':'ก','ฅ':'ก','ฆ':'ก',
            'ง':'ง',
            'จ':'จ','ฉ':'จ','ช':'จ','ซ':'จ','ฌ':'จ',
            'ญ':'ย','ย':'ย',
            'ฎ':'ด','ฏ':'ด','ฐ':'ด','ฑ':'ด','ฒ':'ด','ถ':'ด','ท':'ด','ธ':'ด','ด':'ด','ต':'ต',
            'ณ':'น','น':'น',
            'บ':'บ','ป':'บ','ผ':'พ','พ':'พ','ภ':'พ','ฝ':'ฟ','ฟ':'ฟ',
            'ม':'ม',
            'ร':'ร','ล':'ร','ฬ':'ร',
            'ว':'ว',
            'ศ':'ซ','ษ':'ซ','ส':'ซ',
            'ห':'ห','ฮ':'ฮ',
            'อ':'อ','อ':'อ'
        };

        function thaiNormalize(text) {
            return text.toLowerCase().split('').map(ch => THAI_PHONETIC_MAP[ch] || ch).join('');
        }

        function levenshtein(a, b) {
            const m = a.length, n = b.length;
            const dp = Array.from({length: m + 1}, (_, i) => [i]);
            for (let j = 1; j <= n; j++) dp[0][j] = j;
            for (let i = 1; i <= m; i++) {
                for (let j = 1; j <= n; j++) {
                    dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
                }
            }
            return dp[m][n];
        }

        // Calculate relevance score between query words and database item text
        function calculateScore(itemText, queryWords, rawQuery, expandedInfo) {
            const textLower = itemText.toLowerCase();
            let score = 0;
            let matchCount = 0;
            let matchedWords = [];

            // 1. Exact substring matching (huge priority)
            if (textLower.includes(rawQuery.toLowerCase())) {
                score += 2000;
                if (textLower === rawQuery.toLowerCase()) {
                    score += 3000;
                }
            }

            // 2. Score based on each word in query
            queryWords.forEach((word, index) => {
                const pos = textLower.indexOf(word);
                if (pos !== -1) {
                    matchCount++;
                    matchedWords.push(word);

                    // Stop-words get extremely low weight
                    let weight = 1.0;
                    if (THAI_STOP_WORDS.has(word) || word.length < 2) {
                        weight = 0.05;
                    }

                    // Base word match points
                    score += weight * 1000;

                    // First word matched gets additional weight
                    if (index === 0) {
                        score += weight * 150;
                    }

                    // Match closer to the beginning of the text is better
                    score += (weight * 100 / (pos + 1));
                }
            });

            // 3. Sequential order bonus
            if (matchedWords.length > 1) {
                let lastPos = -1;
                let inOrderCount = 0;
                let isSequential = true;

                for (const word of matchedWords) {
                    const currentPos = textLower.indexOf(word);
                    if (currentPos > lastPos) {
                        inOrderCount++;
                    } else {
                        isSequential = false;
                    }
                    lastPos = currentPos;
                }

                if (inOrderCount === matchedWords.length) {
                    score += 300;
                }
                if (isSequential) {
                    score += 200;
                }
            }

            // 4. Density bonus (prefer shorter matches for the same number of words matched)
            if (matchCount > 0) {
                score += (200 * matchCount / (itemText.length + 1));
            }

            // 5. Smart Semantic Expansion matching
            let semanticMatchedWords = [];
            if (expandedInfo && expandedInfo.expanded.length > 0) {
                for (const expWord of expandedInfo.expanded) {
                    const expLower = expWord.toLowerCase();
                    const pos = textLower.indexOf(expLower);
                    if (pos !== -1) {
                        semanticMatchedWords.push(expWord);
                        const info = expandedInfo.map[expWord];
                        let weight = 0.4;
                        if (info) {
                            if (info.source === 'thai-eng') weight = 0.6;
                            else if (info.source === 'synonym') weight = 0.5;
                            else if (info.source === 'consonant') weight = 0.55;
                            else if (info.source === 'cooccurrence') weight = 0.35;
                        }
                        score += weight * 500;
                    }
                }
            }

            // 6. Thai phonetic fuzzy matching for typo tolerance
            if (score < 100 && rawQuery && /[\u0E00-\u0E7F]/.test(rawQuery)) {
                const normItem = thaiNormalize(itemText);
                const normQuery = thaiNormalize(rawQuery);
                if (normItem.includes(normQuery)) {
                    score += 800;
                    matchCount = Math.max(matchCount, 1);
                }
                for (const origW of queryWords) {
                    if (origW.length < 2 || matchedWords.includes(origW)) continue;
                    const normW = thaiNormalize(origW);
                    const iWords = normItem.split(/\s+/);
                    for (const iw of iWords) {
                        if (iw.length < 2) continue;
                        const dist = levenshtein(normW, iw);
                        if (dist <= Math.min(2, Math.floor(normW.length * 0.4))) {
                            matchedWords.push(origW);
                            matchCount++;
                            score += 600 * (1 - dist / Math.max(normW.length, iw.length));
                            break;
                        }
                    }
                }
            }

            return {
                score,
                matchCount,
                matchedWords,
                semanticMatchedWords
            };
        }

        function is100PercentMatch(itemText, query) {
            if (!itemText || !query) return false;
            const normalize = (str) => {
                return str.trim().toLowerCase()
                    .replace(/['"`‘’“”]/g, '')
                    .replace(/\s+/g, '');
            };
            return normalize(itemText) === normalize(query);
        }

        async function lazyLoadData(query) {

            const finalQuery = _lazySearchQuery;
            _lazySearchQuery = '';
