        function performSearch(query) {
            const q = query.trim();

            // Lazy load if no data yet
            if (items.length === 0 && q) {
                searchStatus.innerHTML = `🔄 กำลังโหลดข้อมูลสำหรับ "${q}"...`;
                resultsDiv.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:60px 0;">⏳ กำลังโหลดฐานข้อมูล โปรดรอสักครู่...</div>';
                lazyLoadData(q);
                return;
            }
            // If still lazy loading, update the pending query
            if (_isLazyLoading && q) {
                _lazySearchQuery = q;
                return;
            }

            if (!q) {
                resultsDiv.innerHTML = '';
                document.getElementById('smart-expansion-info').style.display = 'none';

                const videoCount = items.filter(i => i.type === 'video').length;
                const textCount = items.filter(i => i.type === 'text').length;
                searchStatus.innerHTML = `โหลดเสร็จสิ้น | มีวิดีโอ <span style="color:#fff;font-weight:600">${videoCount.toLocaleString()}</span> รายการ, ข้อความ <span style="color:#fff;font-weight:600">${textCount.toLocaleString()}</span> รายการ`;

                if (wasLoadedWithQuery) {
                    const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
                    window.history.replaceState({ path: cleanUrl }, '', cleanUrl);
                }
                return;
            }

            // Segment query words
            const queryWords = segmentText(q);
            if (queryWords.length === 0) {
                resultsDiv.innerHTML = '';
                return;
            }

            // Smart Semantic Expansion
            const expandedInfo = expandQuerySmart(queryWords, q);

            // Show expansion pills (Hidden as requested)
            const expansionInfoEl = document.getElementById('smart-expansion-info');
            expansionInfoEl.style.display = 'none';

            // Check if the query has any content words
            const contentWords = queryWords.filter(w => !THAI_STOP_WORDS.has(w) && w.length >= 2);
            const hasContentWords = contentWords.length > 0;

            let filtered = items;
            if (currentFilter !== 'all') {
                filtered = items.filter(item => item.type === currentFilter);
            }

            const results = [];
            for (const item of filtered) {
                const scoreInfo = calculateScore(item.text, queryWords, q, expandedInfo);

                if (scoreInfo.score > 0) {
                    // If searched via URL and matches initial URL query, exclude 100% matches
                    if (wasLoadedWithQuery && initialUrlQuery && is100PercentMatch(item.text, initialUrlQuery) && is100PercentMatch(item.text, q)) {
                        continue;
                    }
                    // Noise reduction: 
                    // If the search query has content words, the document must match at least one content word or have semantic matches
                    if (hasContentWords) {
                        const hasMatchingContentWord = scoreInfo.matchedWords.some(w => contentWords.includes(w));
                        const hasSemanticMatch = scoreInfo.semanticMatchedWords && scoreInfo.semanticMatchedWords.length > 0;
                        if (!hasMatchingContentWord && !hasSemanticMatch) continue;
                    }

                    const uniqueMatchedWords = [...new Set(scoreInfo.matchedWords || [])];
                    const contentQueryWords = [...new Set(queryWords.filter(w => !THAI_STOP_WORDS.has(w) && w.length >= 2))];
                    const contentMatchedWords = uniqueMatchedWords.filter(w => !THAI_STOP_WORDS.has(w) && w.length >= 2);

                    const totalCount = contentQueryWords.length > 0 ? contentQueryWords.length : [...new Set(queryWords)].length;
                    const matchedCount = contentQueryWords.length > 0 ? contentMatchedWords.length : uniqueMatchedWords.length;
                    const semanticBonus = (scoreInfo.semanticMatchedWords && scoreInfo.semanticMatchedWords.length > 0) ? 0.3 : 0;
                    const ratio = totalCount > 0 ? Math.min(1, (matchedCount / totalCount) + semanticBonus) : 0;

                    // If loaded with URL query, filter strictly by word match accuracy (without semantic bonus)
                    const wordMatchRatio = totalCount > 0 ? (matchedCount / totalCount) : 0;
                    if (wasLoadedWithQuery && wordMatchRatio < 0.45) continue;

                    // Otherwise, apply normal ratio filter (including semantic bonus) for normal searches
                    if (!wasLoadedWithQuery && ratio < 0.15) continue;

                    results.push({
                        ...item,
                        score: scoreInfo.score,
                        matchedWords: scoreInfo.matchedWords,
                        semanticMatchedWords: scoreInfo.semanticMatchedWords || [],
                        ratio: ratio,
                        totalCount: totalCount,
                        matchedCount: matchedCount
                    });
                }
            }

            // Sort descending by score
            results.sort((a, b) => b.score - a.score);

            const baseUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
            const searchUrl = baseUrl + '?q=' + encodeURIComponent(q);
            const embedUrl = baseUrl + '?q=' + encodeURIComponent(q) + '&embed=true';

            const embedParam = new URLSearchParams(window.location.search).get('embed');
            const isEmbedMode = (embedParam === 'true' || embedParam === '1');

            if (wasLoadedWithQuery) {
                const finalUrl = isEmbedMode ? embedUrl : searchUrl;
                window.history.replaceState({ path: finalUrl }, '', finalUrl);
            }

            searchStatus.innerHTML = `พบข้อมูลเชื่อมโยง <span style="color:#58a6ff;font-weight:600">${results.length.toLocaleString()}</span> รายการ จากฐานข้อมูลทั้งหมด ${items.length.toLocaleString()} รายการ`;

            renderResults(results.slice(0, 50), queryWords);
        }

        function renderResults(results, queryWords) {
            if (results.length === 0) {
                resultsDiv.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:80px 0;">ไม่พบข้อมูลที่ตรงกับเงื่อนไขการค้นหาของคุณ</div>';
                return;
            }

            // Group items: Top Matches must have ratio >= 45% (0.45)
            const topMatches = results.filter(r => r.ratio >= 0.45).slice(0, 3);
            const relevantResults = results.filter(r => !topMatches.includes(r));

            const grouped = {
                'Top Matches': topMatches,
                'Relevant Results': relevantResults
            };

            let html = '';

            for (const [groupName, groupItems] of Object.entries(grouped)) {
                if (groupItems.length === 0) continue;

                if (groupName === 'Top Matches') {
                    html += `<div class="newspaper-section">`;

                    const highlightText = (text, words, cls) => {
                        if (!text) return text;
                        const unique = [...new Set(words || [])].sort((a, b) => b.length - a.length);
                        let result = text;
                        unique.forEach(kw => {

                                result = result.replace(regex, `<span class="${cls}">$1</span>`);

                    };

                    const buildEmbedHtml = (item) => {
                        const isLineVoom = item.type === 'video' && isLineVoomVideo(item.id);
                        if (item.type === 'video' && item.id) {
                            if (isLineVoom) {

                                return postId ? `<blockquote class="line_timeline_embedded_post" data-baseurl="https://linevoom.line.me" data-postid="${postId}" data-writerid="_dd9JDo889wfojzv17U8LwAKX2-hN4oDNIStQBfQ" data-embeddedtime="1782658691883" data-view-type="B" data-with-text data-playable data-auto-play style="width: 100%; min-width: 260px; max-width: 100%"></blockquote>` : '';

                                return `<iframe src="https://www.youtube.com/embed/${vId}?autoplay=0&controls=0&modestbranding=1&rel=0${extraParams}" allow="autoplay; encrypted-media" allowfullscreen loading="lazy"></iframe>`;
                            }

                        return '';
                    };

                    const buildCardData = (item) => {
                        const text = item.text;
                        let headline = text, excerpt = '';
                        const sepMatch = text.match(/^(.+?)[—–\-:!?。\n]/);
                        if (sepMatch && sepMatch[1].length < 80) {
                            headline = sepMatch[1].trim();
                            excerpt = text.slice(sepMatch[0].length).trim();
                        } else {
                            const words = text.split(/\s+/);
                            headline = words.slice(0, Math.min(10, words.length)).join(' ');
                            excerpt = words.slice(10).join(' ');
                        }
                        const hlWords = [...new Set([...(item.matchedWords || []), ...(item.semanticMatchedWords || [])])];
                        const pct = Math.round(item.ratio * 100);
                        // Variable aspect: higher match = wider embed

                        if (pct >= 90) embedAr = '16/9';
                        else if (pct >= 70) embedAr = '4/3';
                        else if (pct >= 50) embedAr = '1/1';
                        else embedAr = '3/4';
                        return {
                            headline: highlightText(headline, hlWords, 'highlight'),
                            excerpt: highlightText(excerpt, hlWords, 'highlight-semantic'),
                            isLineVoom: item.type === 'video' && isLineVoomVideo(item.id),
                            embedHtml: buildEmbedHtml(item),
                            embedAr,
                            pct,
                            typeLabel: item.type === 'video' ? (isLineVoomVideo(item.id) ? 'LINE Voom' : 'YouTube') : 'Article',
                            id: item.id || '',
                            editUrl: getEditUrl(item)
                        };
                    };

                    // Hero item
                    const hero = groupItems[0];
                    const hd = buildCardData(hero);
                    const heroClass = hd.embedHtml ? '' : ' full';
                    html += `<div class="newspaper-hero${heroClass}" data-id="${encodeURIComponent(hero.id || '')}" data-type="${hero.type}" data-text="${encodeURIComponent(hero.text)}">`;
                    if (hd.embedHtml) {
                        html += `<div class="newspaper-embed" style="aspect-ratio:${hd.embedAr}" data-id="${encodeURIComponent(hero.id || '')}" data-type="${hero.type}" data-text="${encodeURIComponent(hero.text)}">${hd.embedHtml}</div>`;
                    }
                    html += `<div class="newspaper-content">
                        <div class="newspaper-headline">${hd.headline}</div>
                        ${hd.excerpt ? `<div class="newspaper-excerpt">${hd.excerpt}</div>` : ''}
                        <div class="newspaper-meta">
                            <span class="newspaper-badge ${hd.pct >= 80 ? 'hot' : ''}">Match ${hd.pct}%</span>
                            <span>${hd.typeLabel}</span>
                            ${hd.id ? `<span>${hd.id}</span>` : ''}
                        </div>
                    </div>
                    ${hd.editUrl ? `<a href="${hd.editUrl}" target="_blank" class="edit-link" title="Edit on GitHub">⚙️</a>` : ''}
                </div>`;

                    // Grid items (2nd, 3rd)
                    const gridItems = groupItems.slice(1);
                    if (gridItems.length > 0) {
                        html += `<div class="newspaper-grid">`;
                        gridItems.forEach(item => {
                            const gd = buildCardData(item);
                            const editHtml = gd.editUrl ? `<a href="${gd.editUrl}" target="_blank" class="edit-link" title="Edit on GitHub">⚙️</a>` : '';
                            html += `<div class="newspaper-card" data-id="${encodeURIComponent(item.id || '')}" data-type="${item.type}" data-text="${encodeURIComponent(item.text)}">
                                ${gd.embedHtml ? `<div class="newspaper-embed" style="aspect-ratio:${gd.embedAr}">${gd.embedHtml}</div>` : ''}
                                <div class="newspaper-card-body">
                                    <div class="newspaper-card-title">${gd.headline}${editHtml}</div>
                                    ${gd.excerpt ? `<div class="newspaper-card-text">${gd.excerpt}</div>` : ''}
                                    <div class="newspaper-card-footer">
                                        <span class="newspaper-badge ${gd.pct >= 80 ? 'hot' : ''}">Match ${gd.pct}%</span>
                                        <span>${gd.typeLabel}</span>
                                    </div>
                                </div>
                            </div>`;
                        });
                        html += `</div>`;
                    }

                    html += `</div>`;

                } else {
                    html += `<div class="result-group-label">${groupName}</div>`;

                    groupItems.forEach(item => {
                        const isLineVoom = item.type === 'video' && isLineVoomVideo(item.id);
                        let highlightedText = item.text;

                        const uniqueSemanticWords = [...new Set(item.semanticMatchedWords || [])];
                        uniqueSemanticWords.sort((a, b) => b.length - a.length);
                        uniqueSemanticWords.forEach(kw => {
                            if (kw.length >= 2) {
                                const regex = new RegExp(`(${escapeRegExp(kw)})(?![^<>]*>)`, 'gi');
                                highlightedText = highlightedText.replace(regex, '<span class="highlight-semantic" title="คำเชื่อมโยง">$1</span>');
                            }
                        });

                        const uniqueMatchedWords = [...new Set(item.matchedWords || [])];
                        uniqueMatchedWords.sort((a, b) => b.length - a.length);
                        uniqueMatchedWords.forEach(kw => {
                            if (kw.length >= 2 || !THAI_STOP_WORDS.has(kw)) {
                                const regex = new RegExp(`(${escapeRegExp(kw)})(?![^<>]*>)`, 'gi');
                                highlightedText = highlightedText.replace(regex, '<span class="highlight">$1</span>');
                            }
                        });

                        let iconHtml = '<div class="card-icon">📄</div>';
                        let typeBadge = '<span class="card-badge">Research & Info</span>';

                        if (item.type === 'video') {
                            const isShorts = !isLineVoom && !item.id.includes('?start=');
                            if (isLineVoom) {
                                iconHtml = `<div class="card-icon line-icon">LINE</div>`;
                                typeBadge = '<span class="linevoom-badge">LINE Voom</span>';
                            } else {
                                iconHtml = `<div class="card-icon yt-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 4-8 4z"/></svg>
                        </div>`;
                                typeBadge = isShorts ? '<span class="shorts-badge">SHORTS</span>' : '<span class="card-badge">YouTube</span>';
                            }
                        }

                        const totalCount = item.totalCount;
                        const matchedCount = item.matchedCount;

                        const metaHtml = item.type === 'video' ? `<span>ID: ${item.id}</span>` : '';
                        const editUrl = getEditUrl(item);

                        const cardClass = 'result-card';

                        const cardMeta = wasLoadedWithQuery ? '' : `
                        <div class="card-meta">
                            ${typeBadge}
                            ${metaHtml}
                        </div>`;

                        let lineVoomEmbedHtml = '';
                        let cardExtraClass = '';
                        if (isLineVoom) {
                            const lineVoomPostId = getLineVoomPostId(item.id);
                            if (lineVoomPostId) {
                                cardExtraClass = ' linevoom-card';
                                lineVoomEmbedHtml = `
                        <div class="linevoom-embed-inline">
                            <blockquote class="line_timeline_embedded_post" data-baseurl="https://linevoom.line.me" data-postid="${lineVoomPostId}" data-writerid="_dd9JDo889wfojzv17U8LwAKX2-hN4oDNIStQBfQ" data-embeddedtime="1782658691883" data-view-type="B" data-with-text data-playable data-auto-play style="width: 100%; min-width: 260px; max-width: 100%"></blockquote>
                        </div>`;
                            }
                        }

                        const editLinkHtml = editUrl ? `<a href="${editUrl}" target="_blank" class="edit-link result-edit" title="Edit on GitHub">⚙️</a>` : '';
                        if (lineVoomEmbedHtml) {
                            html += `
                    <div class="${cardClass}${cardExtraClass}" data-text="${encodeURIComponent(item.text)}" data-id="${item.id || ''}" data-type="${item.type}">
                        ${lineVoomEmbedHtml}
                        ${editLinkHtml}
                    </div>`;
                        } else if (item.type === 'video' && item.id && !isLineVoom) {
                            const vParts = item.id.split('?');
                            const vId = vParts[0];
                            const extraParams = vParts.length > 1 ? `&${vParts[1]}` : '';
                            html += `
                    <div class="${cardClass} has-video" data-text="${encodeURIComponent(item.text)}" data-id="${item.id || ''}" data-type="${item.type}">
                        <div class="result-card-embed">
                            <iframe src="https://www.youtube.com/embed/${vId}?autoplay=0&controls=0&modestbranding=1&rel=0${extraParams}" allow="encrypted-media" allowfullscreen loading="lazy"></iframe>
                        </div>
                        <div class="card-content">
                            <div class="card-text">${highlightedText}${editLinkHtml}</div>
                            ${cardMeta}
                        </div>
                    </div>`;
                        } else {
                            html += `
                    <div class="${cardClass}" data-text="${encodeURIComponent(item.text)}" data-id="${item.id || ''}" data-type="${item.type}">
                        ${iconHtml}
                        <div class="card-content">
                            <div class="card-text">${highlightedText}${editLinkHtml}</div>
                            ${cardMeta}
                        </div>
                    </div>`;
                        }
                    });
                }
            }

            resultsDiv.innerHTML = html;

            // Clicks on linevoom-embed-inline can bubble up to result-card to toggle expansion

            // Dynamically load/execute the LINE VOOM SDK to render new blockquotes
            const inlineEmbeds = document.querySelectorAll('.line_timeline_embedded_post');
            if (inlineEmbeds.length > 0) {
                const oldScript = document.getElementById('linevoom-sdk-script');
                if (oldScript) {
                    oldScript.remove();
                }
                const script = document.createElement('script');
                script.id = 'linevoom-sdk-script';
                script.src = 'https://linevoom.line.me/sdk/timelineJsSdk.min.js';
                script.defer = true;
                document.body.appendChild(script);
            }

            // Newspaper embed click: open video popup
            document.querySelectorAll('.newspaper-embed').forEach(el => {
                const idRaw = el.dataset.id;
                const type = el.dataset.type;
                const text = el.dataset.text ? decodeURIComponent(el.dataset.text) : '';
                if (type === 'video' && idRaw) {
                    el.style.cursor = 'pointer';
                    el.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const videoId = decodeURIComponent(idRaw);
                        const itemText = text;
                        const isLineVoom = isLineVoomVideo(videoId);

                        closeVideo();
                        pauseAllYouTubeEmbeds();

                        if (closeVideoTimeout) {
                            clearTimeout(closeVideoTimeout);
                            closeVideoTimeout = null;
                        }

                        const isShorts = !isLineVoom && !videoId.includes('?start=');
                        const videoIdParts = videoId.split('?');
                        const embedId = videoIdParts[0];
                        const lineVoomPostId = isLineVoom ? getLineVoomPostId(videoId) : null;

                        const videoUrl = isLineVoom
                            ? getLineVoomUrl(videoId)
                            : (isShorts ? `https://youtube.com/shorts/${videoId}` : `https://www.youtube.com/watch?v=${videoId}`);

                        navigator.clipboard.writeText(`${itemText} ${videoUrl}`).then(() => {
                            copyPopup.classList.add('show');
                            setTimeout(() => copyPopup.classList.remove('show'), 2000);
                        });

                        videoFrame.className = 'popup-frame active';
                        videoFrame.classList.add('centered');

                        if (isLineVoom) {
                            videoFrame.classList.add('linevoom', 'standard');
                        } else if (isShorts) {
                            videoFrame.classList.add('shorts');
                        } else {
                            videoFrame.classList.add('standard');
                        }

                        if (isLineVoom && lineVoomPostId) {
                            videoFrame.innerHTML = `
                            <div id="close-video-frame">×</div>
                            <div id="linevoom-embed-container"></div>`;
                            mountLineVoomEmbed(lineVoomPostId);
                        } else {
                            videoFrame.innerHTML = `
                            <div id="close-video-frame">×</div>
                            <div id="yt-player-container"></div>`;

                            const playerVars = { 'autoplay': 1, 'controls': 0, 'modestbranding': 1, 'rel': 0, 'enablejsapi': 1 };
                            if (videoIdParts.length > 1) {
                                const searchParams = new URLSearchParams(videoIdParts[1]);
                                for (const [key, value] of searchParams.entries()) {
                                    playerVars[key] = value;
                                }
                            }

                            if (window.YT && window.YT.Player) {
                                currentPlayer = new window.YT.Player('yt-player-container', {
                                    videoId: embedId,
                                    playerVars: playerVars,
                                    events: { 'onStateChange': (event) => { if (event.data === 0) closeVideo(); } }
                                });
                            } else {
                                const params = videoIdParts.length > 1 ? `&${videoIdParts[1]}` : '';
                                const embedUrl = `https://www.youtube.com/embed/${embedId}?autoplay=1&controls=0&modestbranding=1&rel=0${params}`;
                                document.getElementById('yt-player-container').innerHTML = `<iframe src="${embedUrl}" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
                            }
                        }

                        document.getElementById('close-video-frame').addEventListener('click', (ev) => {
                            ev.stopPropagation();
                            closeVideo();
                        });
                    });
                }
            });

            // Newspaper card click: copy text
            document.querySelectorAll('.newspaper-card').forEach(el => {
                el.addEventListener('click', (e) => {
                    if (e.target.closest('.newspaper-embed')) return;
                    const text = el.dataset.text ? decodeURIComponent(el.dataset.text) : '';
                    if (!text) return;
                    const videoId = el.dataset.id ? decodeURIComponent(el.dataset.id) : '';
                    const itemType = el.dataset.type;
                    let clipboardText = text;
                    if (itemType === 'video' && videoId) {
                        const isLineVoom = isLineVoomVideo(videoId);
                        const videoUrl = isLineVoom
                            ? getLineVoomUrl(videoId)
                            : (videoId.includes('?start=') ? `https://www.youtube.com/watch?v=${videoId}` : `https://youtube.com/shorts/${videoId}`);
                        clipboardText = `${text} ${videoUrl}`;
                    }
                    navigator.clipboard.writeText(clipboardText).then(() => {
                        copyPopup.classList.add('show');
                        setTimeout(() => copyPopup.classList.remove('show'), 2000);
                    });
                });
            });

            // Newspaper hero click: copy text
            document.querySelectorAll('.newspaper-hero').forEach(el => {
                el.addEventListener('click', (e) => {
                    if (e.target.closest('.newspaper-embed') || e.target.closest('.edit-link')) return;
                    const text = el.dataset.text ? decodeURIComponent(el.dataset.text) : '';
                    if (!text) return;
                    const videoId = el.dataset.id ? decodeURIComponent(el.dataset.id) : '';
                    const itemType = el.dataset.type;
                    let clipboardText = text;
                    if (itemType === 'video' && videoId) {
                        const isLineVoom = isLineVoomVideo(videoId);
                        const videoUrl = isLineVoom
                            ? getLineVoomUrl(videoId)
                            : (videoId.includes('?start=') ? `https://www.youtube.com/watch?v=${videoId}` : `https://youtube.com/shorts/${videoId}`);
                        clipboardText = `${text} ${videoUrl}`;
                    }
                    navigator.clipboard.writeText(clipboardText).then(() => {
                        copyPopup.classList.add('show');
                        setTimeout(() => copyPopup.classList.remove('show'), 2000);
                    });
                });
            });

            // Newspaper excerpt click: expand/collapse full text
            document.querySelectorAll('.newspaper-excerpt').forEach(el => {
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    el.classList.toggle('expanded');
                });
            });

            // Inline embed click: pause popup and other embeds
            document.querySelectorAll('.newspaper-embed, .result-card-embed').forEach(el => {
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    pauseAllYouTubeEmbeds();
                });
            });

            // Attach event listeners to results
            document.querySelectorAll('.result-card').forEach(el => {
                const textData = decodeURIComponent(el.dataset.text);
                const videoId = el.dataset.id;
                const itemType = el.dataset.type;

                // Click to copy logic
                el.addEventListener('click', (e) => {
                    if (e.target.closest('.result-card-embed')) return;
                    if (itemType === 'video' && videoId) {
                        const isLineVoom = isLineVoomVideo(videoId);
                        if (isLineVoom) {
                            el.classList.toggle('expanded');
                            setTimeout(() => {
                                window.dispatchEvent(new Event('resize'));
                            }, 350);
                            return;
                        }
                        const isShorts = !isLineVoom && !videoId.includes('?start=');
                        const videoUrl = isLineVoom
                            ? getLineVoomUrl(videoId)
                            : (isShorts ? `https://youtube.com/shorts/${videoId}` : `https://www.youtube.com/watch?v=${videoId}`);
                        const clipboardText = `${textData} ${videoUrl}`;
                        navigator.clipboard.writeText(clipboardText).then(() => {
                            const hasQ = new URLSearchParams(window.location.search).has('q');
                            if (!hasQ) {
                                copyPopup.classList.add('show');
                                el.style.borderColor = 'var(--success)';
                                setTimeout(() => {
                                    copyPopup.classList.remove('show');
                                    el.style.borderColor = 'var(--border)';
                                }, 2000);
                            }
                        });
                    } else {
                        closeVideo();
                        navigator.clipboard.writeText(textData).then(() => {
                            const hasQ = new URLSearchParams(window.location.search).has('q');
                            if (!hasQ) {
                                copyPopup.classList.add('show');
                                el.style.borderColor = 'var(--success)';
                                setTimeout(() => {
                                    copyPopup.classList.remove('show');
                                    el.style.borderColor = 'var(--border)';
                                }, 2000);
                            }
                        });
                    }
                });
            });
        }

        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        // Filter tab click handlers
        document.querySelectorAll('.filter-tabs .tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.filter-tabs .tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.getAttribute('data-filter');
                performSearch(searchInput.value);
            });
        });

        // Search input listener with debounce
        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                wasLoadedWithQuery = false;
                performSearch(searchInput.value);
            }, 200);
        });



        // Reload button click
        reloadBtn.addEventListener('click', (e) => {
            e.preventDefault();
            closeVideo();
            fetchDatabase(true);
        });

        // Close video popup when clicking outside the frame
        document.addEventListener('click', (e) => {
            if (videoFrame.classList.contains('active') && !videoFrame.contains(e.target)) {
                closeVideo();
            }
        });

        // Load database on startup
        initDatabase();
    </script>
</body>

</html>
